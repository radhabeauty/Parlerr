name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
        run: bun run build
      - name: Prepare static output
        run: |
          # Adjust this if the build emits to a different folder
          if [ -d "dist/client" ]; then cp -r dist/client _site; \
          elif [ -d "dist" ]; then cp -r dist _site; \
          else echo "No dist/ folder found"; exit 1; fi
          # SPA fallback for deep-link refreshes
          cp _site/index.html _site/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
